#_preseed_V1
# Debian 13 universal preseed for OVMF / UEFI.
# Disk layout (standard, 40 GiB disk):
#   /dev/sda
#   ├── /dev/sda1        EFI System Partition, FAT32, 1 GiB
#   ├── /dev/sda2        /boot, ext4, 1 GiB, outside LVM
#   └── /dev/sda3        LVM PV, all remaining disk space
#       └── vg0
#           ├── lv_root  /, ext4, 10 GiB
#           ├── lv_home  /home, ext4, 10 GiB
#           ├── lv_tmp   /tmp, ext4, 10 GiB
#           ├── lv_swap  swap, 1 GiB
#           └── lv_var   /var, ext4, all remaining VG space
#
# Disk layout (minimal, 12 GiB disk):
#   /dev/sda
#   ├── /dev/sda1        EFI System Partition, FAT32, 512 MiB
#   ├── /dev/sda2        /boot, ext4, 512 MiB, outside LVM
#   └── /dev/sda3        LVM PV, all remaining disk space
#       └── vg0
#           ├── lv_root  /, ext4, 3 GiB
#           ├── lv_home  /home, ext4, 2 GiB
#           ├── lv_tmp   /tmp, ext4, 1 GiB
#           ├── lv_swap  swap, 512 MiB
#           └── lv_var   /var, ext4, all remaining VG space (~4.5 GiB)
#
# Notes:
#   - /var intentionally receives all remaining space because server data,
#     logs, package cache, PostgreSQL, containers, and many daemons grow there.
#   - Fixed sizes use MiB values chosen to appear close to 10.00g / 1.00g in
#     lvs/lsblk output, not 9.54g / 976m.
#   - This UEFI layout uses a GPT partition table and is intended for
#     Proxmox OVMF / UEFI boot.
#
# Other settings:
#   - Network: DHCP during install. Post-install: DHCP (default) or static IP
#     via STATIC_IP variable in late_command.
#   - Hostname/domain/DNS: set via HOSTNAME, DOMAIN, DNS1, DNS2 in late_command.
#     Network section below must match.
#   - Locale/keymap: en_US.UTF-8, US keyboard.
#   - Time: UTC timezone, UTC hardware clock, NTP enabled.
#   - APT during install: uses DVD first, skips mirror selection prompts.
#   - APT after install: writes Debian trixie online repositories in
#     /etc/apt/sources.list.
#   - Root password is stored as SHA-512 crypt hash
#   - Regular user user is created
#   - Late command disables root SSH login
#   - Packages from installer media: standard task, openssh-server, curl, wget,
#     vim, net-tools, lvm2, ifupdown.
#     /etc/hosts, enables ssh, then best-effort installs qemu-guest-agent.
#   - qemu-guest-agent install log: /root/late-apt.log.
#   - Proxmox note: use OVMF / UEFI firmware and add an EFI Disk to the VM.
#   - Proxmox note: also enable the VM option with "qm set <VMID> -agent enabled=1".
#
# Recommended minimum disk: 42 GB.

### Localization
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us


### Network - DHCP
### Hostname и domain должны совпадать с переменными HOSTNAME/DOMAIN в late_command
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string static-test
d-i netcfg/get_hostname seen true
d-i netcfg/hostname string static-test
d-i netcfg/hostname seen true
d-i netcfg/get_domain string home.arpa
d-i netcfg/get_domain seen true
d-i netcfg/wireless_wep string

### Mirror / APT
d-i mirror/suite string trixie
d-i choose-mirror/no-mirror boolean true
d-i apt-setup/use_mirror boolean false
d-i apt-setup/cdrom/set-first boolean false
d-i apt-setup/cdrom/set-next boolean false
d-i apt-setup/cdrom/set-double boolean false
d-i apt-setup/cdrom/set-failed boolean false
d-i apt-setup/non-free-firmware boolean true
d-i apt-setup/non-free boolean true
d-i apt-setup/contrib boolean true


### Time
d-i clock-setup/utc boolean true
d-i time/zone string Etc/UTC
d-i clock-setup/ntp boolean true

### Partitioning - UEFI / GPT + LVM
d-i partman-auto/disk string /dev/sda
d-i partman-auto/method string lvm
d-i partman-auto/choose_recipe select standard-lvm-uefi
d-i partman-auto-lvm/guided_size string max
d-i partman-auto-lvm/new_vg_name string vg0
d-i partman-auto/purge_lvm_from_device boolean true
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true
d-i partman-basicfilesystems/no_swap boolean false
d-i partman/default_filesystem string ext4
d-i partman-partitioning/choose_label select gpt
d-i partman-partitioning/default_label string gpt

