### Packages
tasksel tasksel/first multiselect standard
d-i pkgsel/include string openssh-server curl wget vim net-tools lvm2 ifupdown sudo
d-i pkgsel/upgrade select full-upgrade
popularity-contest popularity-contest/participate boolean false


### GRUB
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true
d-i grub-installer/bootdev string /dev/sda


### Late command
### Переменные для настройки машины — менять только здесь
d-i preseed/late_command string \
    HOSTNAME=static-test ; \
    DOMAIN=home.arpa ; \
    STATIC_IP=true ; \
    IP=172.20.20.222 ; \
    MASK=255.255.255.0 ; \
    GW=172.20.20.1 ; \
    DNS1=172.20.20.1 ; \
    DNS2=8.8.8.8 ; \
    IFACE=$(ip -o link show | grep -v lo | grep -v 'link/ether 00:00' | awk 'NR==1{print $2}' | tr -d ':') ; \
    sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin no/' /target/etc/ssh/sshd_config ; \
    grep -q '^PermitRootLogin no' /target/etc/ssh/sshd_config || echo 'PermitRootLogin no' >> /target/etc/ssh/sshd_config ; \
    echo "$HOSTNAME" > /target/etc/hostname ; \
    sed -i '/^127\.0\.1\.1/d' /target/etc/hosts ; \
    echo "127.0.1.1 ${HOSTNAME}.${DOMAIN} ${HOSTNAME}" >> /target/etc/hosts ; \
    echo 'deb http://deb.debian.org/debian trixie main contrib non-free non-free-firmware' > /target/etc/apt/sources.list ; \
    echo 'deb http://deb.debian.org/debian trixie-updates main contrib non-free non-free-firmware' >> /target/etc/apt/sources.list ; \
    echo 'deb http://security.debian.org/debian-security trixie-security main contrib non-free non-free-firmware' >> /target/etc/apt/sources.list ; \
    in-target usermod -aG sudo user || true ; \
    in-target systemctl enable ssh || true ; \
    in-target apt update > /target/root/late-apt.log 2>&1 || true ; \
    in-target env DEBIAN_FRONTEND=noninteractive apt install -y qemu-guest-agent >> /target/root/late-apt.log 2>&1 || true ; \
    in-target systemctl enable qemu-guest-agent >> /target/root/late-apt.log 2>&1 || true ; \
    if [ "$STATIC_IP" = "true" ]; then \
        printf 'auto lo\niface lo inet loopback\n\nallow-hotplug %s\niface %s inet static\n    address %s\n    netmask %s\n    gateway %s\n    dns-nameservers %s %s\n' \
            "$IFACE" "$IFACE" "$IP" "$MASK" "$GW" "$DNS1" "$DNS2" > /target/etc/network/interfaces ; \
        printf 'nameserver %s\nnameserver %s\n' "$DNS1" "$DNS2" > /target/etc/resolv.conf ; \
    fi

### Finish
d-i finish-install/reboot_in_progress note