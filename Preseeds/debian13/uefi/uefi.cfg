d-i partman-auto/expert_recipe string \
    standard-lvm-uefi :: \
        537 537 537 free \
            $iflabel{ gpt } \
            $reusemethod{ } \
            method{ efi } \
            format{ } \
        . \
        537 537 537 ext4 \
            method{ format } format{ } \
            use_filesystem{ } filesystem{ ext4 } \
            mountpoint{ /boot } \
        . \
        1000 1000 -1 lvm \
            method{ lvm } \
            vg_name{ vg0 } \
        . \
        3222 3222 3222 ext4 \
            $lvmok{ } in_vg{ vg0 } lv_name{ lv_root } \
            method{ format } format{ } \
            use_filesystem{ } filesystem{ ext4 } \
            mountpoint{ / } \
        . \
        2148 2148 2148 ext4 \
            $lvmok{ } in_vg{ vg0 } lv_name{ lv_home } \
            method{ format } format{ } \
            use_filesystem{ } filesystem{ ext4 } \
            mountpoint{ /home } \
        . \
        1074 1074 1074 ext4 \
            $lvmok{ } in_vg{ vg0 } lv_name{ lv_tmp } \
            method{ format } format{ } \
            use_filesystem{ } filesystem{ ext4 } \
            mountpoint{ /tmp } \
        . \
        537 537 537 linux-swap \
            $lvmok{ } in_vg{ vg0 } lv_name{ lv_swap } \
            method{ swap } format{ } \
        . \
        1 3000 -1 ext4 \
            $lvmok{ } in_vg{ vg0 } lv_name{ lv_var } \
            method{ format } format{ } \
            use_filesystem{ } filesystem{ ext4 } \
            mountpoint{ /var } \
        .

d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true


